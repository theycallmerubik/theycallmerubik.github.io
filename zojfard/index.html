<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time & Date — ZojFard Timekeeper</title>
  <meta name="description" content="A glassmorphism clock with switchable Jalali and Gregorian dates." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/snap.svg/0.5.1/snap.svg-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jalaali-js/dist/jalaali.min.js"></script>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <main class="shell">
    <!-- LEFT: analog clock -->
    <section class="panel panel-clock" aria-label="Analog clock">
      <div class="clock-wrap">
        <svg id="clock" viewBox="0 0 142 142" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="dial" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(124,92,255,0.22)" />
              <stop offset="60%" stop-color="rgba(26,33,72,0.55)" />
              <stop offset="100%" stop-color="rgba(11,16,38,0.85)" />
            </radialGradient>
            <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(230,233,255,0.55)" />
              <stop offset="100%" stop-color="rgba(124,92,255,0.15)" />
            </linearGradient>
          </defs>

          <!-- dial -->
          <circle cx="71" cy="71" r="69" fill="url(#dial)" stroke="url(#ring)" stroke-width="1.2" />
          <circle cx="71" cy="71" r="62" fill="none" stroke="rgba(230,233,255,0.08)" stroke-width="0.6" />

          <!-- tick marks -->
          <g id="ticks" stroke="rgba(230,233,255,0.5)" stroke-linecap="round"></g>

          <!-- hour hand -->
          <g id="handH">
            <rect x="69.6" y="32" width="2.8" height="42" rx="1.4" fill="#e6e9ff" />
            <text id="handTextH" x="71" y="40" text-anchor="middle" font-size="0" fill="transparent">H</text>
          </g>
          <!-- minute hand -->
          <g id="handM">
            <rect x="70.1" y="20" width="1.8" height="54" rx="0.9" fill="#e6e9ff" />
            <text id="handTextM" x="71" y="26" text-anchor="middle" font-size="0" fill="transparent">M</text>
          </g>
          <!-- second hand -->
          <g id="handS">
            <rect x="70.55" y="14" width="0.9" height="62" fill="#7c5cff" />
            <circle cx="71" cy="80" r="3" fill="#7c5cff" />
            <text id="handTextS" x="71" y="18" text-anchor="middle" font-size="0" fill="transparent">S</text>
          </g>

          <circle cx="71" cy="71" r="2.4" fill="#0b1026" stroke="#e6e9ff" stroke-width="0.6" />
        </svg>
      </div>

      <div class="digital">
        <span class="displayH">00</span><span class="sep">:</span><span class="displayM">00</span><span class="sep">:</span><span class="displayS">00</span>
      </div>
    </section>

    <!-- RIGHT: info + controls -->
    <section class="panel panel-info" aria-label="Date">
      <header class="bar">
        <div class="brand">
          <span class="dot"></span>
          <span>Zoj-Fard TimeKeeper</span>
        </div>
        <div class="controls">
          <button class="swap" type="button" aria-label="Switch calendar">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M7 7h10l-2-2 1.4-1.4L20.8 8l-4.4 4.4L15 11l2-2H7V7zm10 10H7l2 2-1.4 1.4L3.2 16l4.4-4.4L9 13l-2 2h10v2z"/>
            </svg>
            <span>Swap</span>
          </button>
          <div class="mode" role="switch" aria-label="Toggle theme">
            <button type="button" aria-label="Theme toggle"></button>
          </div>
        </div>
      </header>

      <div class="date-card">
        <div class="weekday-row">
          <span class="label">Today</span>
          <span id="weekday" class="weekday">Saturday</span>
        </div>

        <div id="date" class="date-grid">00 00 00 00</div>

        <div class="meta">
          <div class="meta-item">
            <span class="label">Week</span>
            <span id="week-type" class="value">Odd</span>
          </div>
          <div class="meta-item">
            <span class="label">Calendar</span>
            <span id="calendar-name" class="value">Jalali</span>
          </div>
        </div>
      </div>

      <footer class="foot">
        <span>Made with <span class="heart">♥</span></span>
        <span class="sig"><a href="https://Ru-Bic.ir" target="_blank">Rubik</a> · <a href="https://t.me/icy_Tick">Icy</a></span>
      </footer>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
