<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoj-Fard TimeKeeper</title>
  <meta name="description" content="Ultra modern Jalali/Gregorian clock and date dashboard in one HTML file." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="aurora" aria-hidden="true">
    <span class="orb one"></span>
    <span class="orb two"></span>
    <span class="orb three"></span>
  </div>
  <div class="noise" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <main class="app">
    <section class="card clock-card" aria-label="ساعت آنالوگ و دیجیتال">
      <div class="clock-stage">
        <div class="clock">
          <svg viewBox="0 0 200 200" role="img" aria-label="Analog clock">
            <defs>
              <linearGradient id="ringGradient" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="50%" stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#34d399"/>
              </linearGradient>
            </defs>

            <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ringGradient)" stroke-width="1.4" opacity=".72"/>
            <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>

            <g id="ticks"></g>

            <text x="100" y="38" text-anchor="middle" fill="currentColor" opacity=".75" font-size="10" font-family="JetBrains Mono">XII</text>
            <text x="162" y="104" text-anchor="middle" fill="currentColor" opacity=".75" font-size="10" font-family="JetBrains Mono">III</text>
            <text x="100" y="169" text-anchor="middle" fill="currentColor" opacity=".75" font-size="10" font-family="JetBrains Mono">VI</text>
            <text x="38" y="104" text-anchor="middle" fill="currentColor" opacity=".75" font-size="10" font-family="JetBrains Mono">IX</text>

            <line id="hourHand" class="hand hand-hour" x1="100" y1="100" x2="100" y2="61"/>
            <line id="minuteHand" class="hand hand-minute" x1="100" y1="100" x2="100" y2="43"/>
            <line id="secondHand" class="hand hand-second" x1="100" y1="112" x2="100" y2="31"/>

            <circle cx="100" cy="100" r="7.5" class="pin"/>
            <circle cx="100" cy="100" r="3.2" fill="#fb7185"/>
          </svg>

        </div>
        <div class="digital-pod">
          <div class="digital">
            <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span><span class="colon">:</span><span id="ss">00</span>
          </div>
          <div class="mini-row">
            <span id="ampm">24H</span>
            <span>•</span>
            <span id="timezone">Local</span>
          </div>
        </div>
      </div>
    </section>

    <section class="card info-card" aria-label="تاریخ و کنترل‌ها">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">
            <strong>Zoj-Fard TimeKeeper</strong>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="calendarBtn" type="button">تقویم: شمسی</button>
          <button class="btn" id="formatBtn" type="button">۲۴ ساعته</button>
          <button class="btn" id="themeBtn" type="button">لایت/دارک</button>
        </div>
      </header>

      <section class="hero-date">
        <div>
          <div class="kicker" id="todayLabel">امروز</div>
          <h1 class="weekday" id="weekday">شنبه</h1>
        </div>

        <div class="date-grid" id="dateGrid">
          <div class="date-cell" data-label="قرن">00</div>
          <div class="date-cell" data-label="سال">00</div>
          <div class="date-cell" data-label="ماه">00</div>
          <div class="date-cell" data-label="روز">00</div>
        </div>

        <div class="stats">
          <div class="stat">
            <span>هفته</span>
            <strong id="weekType">فرد</strong>
          </div>
          <div class="stat">
            <span>تقویم</span>
            <strong id="calendarName">شمسی</strong>
          </div>
          <div class="stat">
            <span>روز سال</span>
            <strong id="dayOfYear">000</strong>
          </div>
        </div>
      </section>

      <footer class="footer">
        <span>Made with <span class="heart">♥</span> for a next-level timekeeper</span>
        <span><a href="https://Ru-Bic.ir" target="_blank" rel="noreferrer">Rubik</a> · <a href="https://t.me/icy_Tick" target="_blank" rel="noreferrer">Icy</a></span>
      </footer>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
